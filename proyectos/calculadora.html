<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 480px;">
        <a href="../index.html" class="d-inline-block mb-3 text-decoration-none">
            <i class="bi bi-arrow-left"></i> Volver al portafolio
        </a>

        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h2>Calculadora Básica</h2>
            </div>
            <div class="card-body">
                <label for="num1" class="form-label">Primer Número</label>
                <input type="number" id="num1" class="form-control mb-3">

                <label for="num2" class="form-label">Segundo Número</label>
                <input type="number" id="num2" class="form-control mb-3">

                <button class="btn btn-success w-100 mb-2" onclick="sumar()">
                    Sumar
                </button>
                <button class="btn btn-success w-100 mb-2" onclick="resta()">
                    Restar
                </button>
                <button class="btn btn-success w-100 mb-2" onclick="multiplicacion()">
                    Multiplicar
                </button>
                <button class="btn btn-success w-100 mb-2" onclick="division()">
                    Dividir
                </button>

                <label for="resultado" class="form-label mt-2">Resultado</label>
                <input type="text" id="resultado" class="form-control" readonly>
            </div>
        </div>
    </div>

    <script>
        function sumar() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);
            document.getElementById("resultado").value = n1 + n2;
        }

        function resta() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);
            document.getElementById("resultado").value = n1 - n2;
        }

        function multiplicacion() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);
            document.getElementById("resultado").value = n1 * n2;
        }

        function division() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);
            if (n2 === 0) {
                document.getElementById("resultado").value = "Error: no se puede dividir por 0";
            } else {
                document.getElementById("resultado").value = n1 / n2;
            }
        }
    </script>
</body>
</html>
